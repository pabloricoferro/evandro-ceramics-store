name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No configure-pages: it calls get Pages site and 404s until the repo has
      # Pages enabled in Settings; static upload does not need it.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "UOMI"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
