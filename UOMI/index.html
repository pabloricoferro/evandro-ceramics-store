<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UOMI | Home</title>
    <meta
      name="description"
      content="UOMI ceramic art: handcrafted ceramic pieces for contemporary spaces."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="home-page">
    <script src="figures.js"></script>
    <div class="page-bg page-bg-pattern" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMinYMin" width="100%" height="100%">
        <rect width="100%" height="100%" fill="url(#uomi-pattern)" />
      </svg>
    </div>

    <header class="topbar">
      <div class="container nav">
        <a href="index.html" class="brand">UOMI</a>
        <nav>
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </nav>
        <button class="cart-btn" id="cartButton" aria-label="Shopping cart">
          <span class="cart-icon" aria-hidden="true">🛒</span>
          <span class="cart-count" id="cartCount">0</span>
        </button>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container hero-content">
          <p class="kicker">UOMI Ceramic Art</p>
          <h1>Cuadros ceramicos unicos para espacios contemporaneos.</h1>
          <p>
            Explora piezas tipo cuadro en ceramica, trabajadas a mano y listas
            para coleccionar.
          </p>
          <a class="cta" href="shop.html">Ver coleccion</a>
        </div>
      </section>

      <section class="container section">
        <div class="section-title-row">
          <h2>Bienvenido a UOMI</h2>
          <p>Navega por Home, Shop, About y Contact.</p>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <p>&copy; <span id="year"></span> UOMI. All rights reserved.</p>
      </div>
    </footer>

    <script src="script.js"></script>

</html>
